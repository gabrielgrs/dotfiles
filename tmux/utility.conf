# Display lazygit
unbind C-l
bind-key g switch-client -T mytable
bind-key -T mytable l display-popup \
  -d '#{pane_current_path}' \
  -w 90% \
  -h 90% \
  -E lazygit

# Run Claude Code in a separate session
bind -r y run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \
  tmux display-popup -w90% -h90% -E "tmux attach-session -t $SESSION"'
